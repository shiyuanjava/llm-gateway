# LLM Gateway 单机部署:MySQL + Redis + 网关 + 管理台(nginx 同源反代)。
# 使用:cp .env.example .env && 编辑必填项 && docker compose up -d --build
# 前置:前端仓库 llm-gateway-ui 与本仓库同级(build context ../llm-gateway-ui)。
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: llm_gateway
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # 纯缓存:不持久化(丢了就丢了),内存上限 + LRU 淘汰。
    # 刻意不映射宿主机端口:仅容器网络内可达(与 gateway 9090 同一策略),故不设密码
    command: ["redis-server", "--save", "", "--appendonly", "no",
              "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  nacos:
    image: nacos/nacos-server:v3.1.1
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLED: "false"
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"   # 控制台/HTTP API
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/v3/client/health/readiness || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 20s
    restart: unless-stopped

  # 首启把运营参数与限流规则发布到 Nacos(发布是覆盖语义,重复执行幂等)
  nacos-init:
    image: curlimages/curl:8.10.1
    depends_on:
      nacos:
        condition: service_healthy
    volumes:
      - ./deploy/nacos-init/init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: "no"

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:latest
    ports:
      - "8858:8858"
    restart: unless-stopped

  gateway:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: llm_gateway
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      GATEWAY_CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:?请在 .env 设置 GATEWAY_JWT_SECRET(至少 32 字符)}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GATEWAY_ADMIN_ALLOWED_ORIGINS: ${GATEWAY_ADMIN_ALLOWED_ORIGINS:-}
      NACOS_SERVER_ADDR: nacos:8848
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
      GATEWAY_RATE_LIMIT_STORE: sentinel
      TZ: Asia/Shanghai
    # 刻意不映射 8080/9090 到宿主机:业务流量经 ui 反代,Actuator 仅容器网络内可达
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9090/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  ui:
    build:
      context: ../llm-gateway-ui
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "${UI_PORT:-8081}:80"
    restart: unless-stopped

volumes:
  mysql-data:
  nacos-data:
