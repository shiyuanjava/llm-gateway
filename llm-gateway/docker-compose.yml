# LLM Gateway 单机部署:MySQL + Redis + 网关 + 管理台(nginx 同源反代)。
# 使用:cp .env.example .env(只需基础设施密钥)&& docker compose up -d --build
#      首次启动后在 Nacos 控制台(http://localhost:8850)的 llm-gateway.yaml 里填应用密钥,
#      再 docker compose restart gateway。密钥说明见 deploy/nacos-init/init.sh 发布的模板。
# 前置:前端目录 llm-gateway-ui 与本目录同级、同属一个仓库(build context ../llm-gateway-ui)。
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 设置 MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: llm_gateway
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    environment:
      # healthcheck 的 shell 里引用;requirepass 由 compose 在 command 里插值
      REDIS_PASSWORD: ${REDIS_PASSWORD:?请在 .env 设置 REDIS_PASSWORD}
    # 纯缓存:不持久化(丢了就丢了),内存上限 + LRU 淘汰。
    # 刻意不映射宿主机端口:仅容器网络内可达;即便如此仍设密码作纵深防御,不裸奔靠网络隔离兜底
    command: ["redis-server", "--save", "", "--appendonly", "no",
              "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru",
              "--requirepass", "${REDIS_PASSWORD:?请在 .env 设置 REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  nacos:
    image: nacos/nacos-server:v3.1.1
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLED: "false"
      # v3 镜像启动脚本强制要求以下三项非空(即便 auth 关闭);本地单机用固定占位值
      NACOS_AUTH_TOKEN: "SecretKey012345678901234567890123456789012345678901234567890123456789"
      NACOS_AUTH_IDENTITY_KEY: "nacos-local"
      NACOS_AUTH_IDENTITY_VALUE: "nacos-local"
      TZ: Asia/Shanghai
    ports:
      # 管理组件只监听本机，远程查看请使用 SSH 隧道，避免把无鉴权控制台暴露到公网
      - "127.0.0.1:8848:8848"   # 客户端 HTTP API
      - "127.0.0.1:8850:8080"   # v3 控制台
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      # v3 起 readiness 在控制台端口 8080,不在 8848
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v3/console/health/readiness || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 20s
    restart: unless-stopped

  # 首启把运营参数与限流规则发布到 Nacos(发布是覆盖语义,重复执行幂等)
  nacos-init:
    image: curlimages/curl:8.10.1
    depends_on:
      nacos:
        condition: service_healthy
    volumes:
      - ./deploy/nacos-init/init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: "no"

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:latest
    ports:
      - "127.0.0.1:8858:8858"
    restart: unless-stopped

  gateway:
    image: ${GATEWAY_IMAGE:-llm-gateway-gateway:local}
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DB: llm_gateway
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      GATEWAY_CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?请在 .env 设置 REDIS_PASSWORD}
      # 应用密钥(GATEWAY_JWT_SECRET/ADMIN_*/供应商 Key/跨域白名单)不再经环境变量注入:
      # 统一放 Nacos 的 llm-gateway.yaml(nacos-init 首启发布空模板,控制台填写)。
      # 刻意不传空值环境变量 —— Spring 里环境变量优先级高于 Nacos,空字符串会遮蔽 Nacos 配置。
      NACOS_SERVER_ADDR: nacos:8848
      SENTINEL_DASHBOARD: sentinel-dashboard:8858
      GATEWAY_RATE_LIMIT_STORE: sentinel
      # nacos-client 默认往 ${user.home}/logs 写日志,非 root 用户不可写会让 Logback 初始化直接失败
      JAVA_TOOL_OPTIONS: "-DJM.LOG.PATH=/app/logs/nacos -Dnacos.logging.default.config.enabled=false -Dcsp.sentinel.log.dir=/app/logs/sentinel"
      TZ: Asia/Shanghai
    volumes:
      # prod profile 会写滚动文件日志；外挂后重建容器不会丢失最近 14 天日志
      - gateway-logs:/app/logs
    # 刻意不映射 8080/9090 到宿主机:业务流量经 ui 反代,Actuator 仅容器网络内可达
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9090/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  ui:
    image: ${UI_IMAGE:-llm-gateway-ui:local}
    build:
      context: ../llm-gateway-ui
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "${UI_PORT:-8081}:80"
    restart: unless-stopped

volumes:
  mysql-data:
  nacos-data:
  gateway-logs:
