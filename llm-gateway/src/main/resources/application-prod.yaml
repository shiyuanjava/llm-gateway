# 生产 profile 差异(SPRING_PROFILES_ACTIVE=prod 激活;文件日志见 logback-spring.xml 的 prod springProfile)
spring:
  datasource:
    # 生产必须显式提供 MYSQL_PASSWORD:无默认值,不会静默回退到 application.yaml 的开发密码。
    # 缺失时占位符原样下发、连库被拒,启动失败(表现为 Access denied,先查该环境变量)
    password: ${MYSQL_PASSWORD}
  flyway:
    placeholders:
      # 演示 Key(sk-demo-tenant-a/b 明文公开)不进生产:V3 迁移按此占位符执行清除
      purge_demo_api_keys: "true"

gateway:
  cache:
    # compose 部署设 GATEWAY_CACHE_STORE=redis;不设则与开发一致走内存
    store: ${GATEWAY_CACHE_STORE:memory}
  admin:
    # 同源反代部署默认零跨域;确需分域时用 GATEWAY_ADMIN_ALLOWED_ORIGINS 打开(逗号分隔)
    allowed-origins: ${GATEWAY_ADMIN_ALLOWED_ORIGINS:}
