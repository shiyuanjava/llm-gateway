stages:
  - verify
  - image
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  GATEWAY_IMAGE: "$CI_REGISTRY_IMAGE/gateway:$CI_COMMIT_SHA"
  UI_IMAGE: "$CI_REGISTRY_IMAGE/ui:$CI_COMMIT_SHA"
  # Docker-in-Docker 仅存在于隔离的 Job 网络；显式关闭该内部链路 TLS，避免 Runner 还需挂载证书目录。
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  # 浅克隆:服务器磁盘小,所有 Job 都不需要完整历史
  GIT_DEPTH: "20"

cache:
  paths:
    - .m2/repository/
    - llm-gateway-ui/.npm/

backend_test:
  stage: verify
  image: maven:3.9-eclipse-temurin-21
  services:
    - name: mysql:8.4
      alias: mysql
      # 服务容器专属变量(优先级高于 Job 变量)。坑:GitLab 会把 Job 级 variables 整体注入
      # service 容器,而官方 mysql 镜像禁止 MYSQL_USER=root——这里显式置空抵消泄漏。
      # 该数据库只存在于当前 Job,结束后自动销毁。
      variables:
        MYSQL_ROOT_PASSWORD: "ci-test-mysql-password"
        MYSQL_ROOT_HOST: "%"
        MYSQL_DATABASE: "llm_gateway"
        MYSQL_USER: ""
        MYSQL_PASSWORD: ""
  variables:
    # 以下供被测应用读取(application.yaml 的 ${MYSQL_*} 占位符);集成测试执行 Flyway 访问真 MySQL
    MYSQL_HOST: "mysql"
    MYSQL_PORT: "3306"
    MYSQL_DB: "llm_gateway"
    MYSQL_USER: "root"
    MYSQL_PASSWORD: "ci-test-mysql-password"
    # 测试环境用环境变量注入即可(环境变量优先级高于 Nacos);生产密钥在 Nacos,不在 CI 变量里
    GATEWAY_JWT_SECRET: "ci-test-secret-0123456789abcdef0123456789abcdef"
    # CI 里没有 Nacos/Sentinel:显式关闭,否则 nacos-client 对 localhost:8848 反复重连,
    # 每个测试上下文都卡住数分钟(限流/缓存在测试中本就走内存实现,不受影响)
    NACOS_DISCOVERY_ENABLED: "false"
    SPRING_CLOUD_NACOS_CONFIG_ENABLED: "false"
    SPRING_CLOUD_SENTINEL_ENABLED: "false"
  before_script:
    # Maven Central 国内直连极慢:本 Job 容器内写入阿里云 mirror(与 .m2 缓存叠加,首次绿后增量下载)
    - mkdir -p ~/.m2
    - printf '<settings><mirrors><mirror><id>aliyun</id><mirrorOf>central</mirrorOf><url>https://maven.aliyun.com/repository/public</url></mirror></mirrors></settings>' > ~/.m2/settings.xml
    # MySQL 初始化需要十几秒,等 3306 真正可连再开跑(初始化期的临时实例不监听 TCP,探测可靠)
    - timeout 120 bash -c 'until (echo > /dev/tcp/mysql/3306) 2>/dev/null; do sleep 2; done'
  script:
    - cd llm-gateway
    - mvn --batch-mode test
  artifacts:
    when: always
    reports:
      junit: llm-gateway/target/surefire-reports/TEST-*.xml

frontend_build:
  stage: verify
  image: node:20-alpine
  before_script:
    - cd llm-gateway-ui
    # npm 官方源国内慢,走 npmmirror
    - npm config set registry https://registry.npmmirror.com
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    paths:
      - llm-gateway-ui/dist/
    expire_in: 7 days

# 当前仓库已有部分历史文件未按 Prettier 重写，先把格式检查作为质量提示，
# 避免它阻断部署；逐步格式化存量文件后可删除 allow_failure。
frontend_format:
  stage: verify
  image: node:20-alpine
  before_script:
    - cd llm-gateway-ui
    - npm config set registry https://registry.npmmirror.com
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run format:check
  allow_failure: true

# 需要 GitLab Container Registry(启用方法见部署文档)。镜像在 CI 里构建并推到 Registry,
# 服务器只拉镜像 —— 不在服务器上编译、不把源码留在服务器上。
build_images:
  stage: image
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
      # dind 是独立的 Docker 守护进程,不读宿主机 daemon.json:
      # --insecure-registry 放行自建 HTTP Registry(上 HTTPS 后可删);
      # --registry-mirror 国内直连 Docker Hub 不通,构建拉基础镜像走加速(失效就换当期可用的)
      command:
        - "--insecure-registry=119.29.120.205:5050"
        - "--registry-mirror=https://mirror.ccs.tencentyun.com"
        - "--registry-mirror=https://docker.m.daocloud.io"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build --pull -t "$GATEWAY_IMAGE" llm-gateway
    - docker build --pull -t "$UI_IMAGE" llm-gateway-ui
    - docker push "$GATEWAY_IMAGE"
    - docker push "$UI_IMAGE"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_REGISTRY'

# Compose 路线:shell executor Runner(标签 llm-deploy)在服务器本机执行。
# 服务器上不构建、不保留完整项目副本:只把 compose 文件与 nacos-init 脚本同步到 /opt/llm-gateway,
# 再从 Registry 拉取本次提交的镜像启动。
# 密钥分两级,均不进仓库与 CI 变量:
#   - 基础设施密码(MYSQL_ROOT_PASSWORD/REDIS_PASSWORD)在服务器 /opt/llm-gateway/.env,手工创建一次;
#   - 应用密钥(JWT/管理员/供应商 Key)在 Nacos 的 llm-gateway.yaml,控制台填写一次。
deploy_compose:
  stage: deploy
  tags:
    - llm-deploy
  needs:
    - job: build_images
  variables:
    GIT_DEPTH: "1"
    DEPLOY_DIR: /opt/llm-gateway
  script:
    - test -f "$DEPLOY_DIR/.env" || { echo "缺少 $DEPLOY_DIR/.env(MYSQL_ROOT_PASSWORD/REDIS_PASSWORD/UI_PORT),按部署文档初始化一次"; exit 1; }
    - install -D -m 644 llm-gateway/docker-compose.yml "$DEPLOY_DIR/docker-compose.yml"
    - install -D -m 644 llm-gateway/deploy/nacos-init/init.sh "$DEPLOY_DIR/deploy/nacos-init/init.sh"
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker compose --env-file "$DEPLOY_DIR/.env" -f "$DEPLOY_DIR/docker-compose.yml" pull gateway ui
    - |
      docker compose --env-file "$DEPLOY_DIR/.env" -f "$DEPLOY_DIR/docker-compose.yml" up -d --wait || {
        docker compose --env-file "$DEPLOY_DIR/.env" -f "$DEPLOY_DIR/docker-compose.yml" ps
        echo "若是首次部署:gateway 会因 Nacos 里还没填 GATEWAY_JWT_SECRET 而反复重启。"
        echo "SSH 隧道打开 Nacos 控制台填好密钥后,重跑本 Job 即可。"
        exit 1
      }
    # 小盘服务器:清掉不再被任何容器使用的镜像(含旧版本 gateway/ui);回滚时重跑旧流水线会从 Registry 重新拉取
    - docker image prune -af
  environment:
    name: compose-production
    url: "http://$DEPLOY_HOST:8081"
  resource_group: compose-production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_REGISTRY'
      when: manual

# K3s 路线:KUBE_CONFIG 是 GitLab 的 File 类型变量(唯一需要配置的 CI 凭据)。
# llm-gateway-secrets 与 gitlab-registry 两个 Secret 按部署文档在集群里手工创建一次,CI 不再管理密钥。
deploy_k3s:
  stage: deploy
  image: alpine:3.21
  needs:
    - job: build_images
  before_script:
    - apk add --no-cache kubectl
    - export KUBECONFIG="$KUBE_CONFIG"
  script:
    - kubectl apply -k deploy/k8s/base
    - kubectl -n llm-gateway set image deployment/gateway gateway="$GATEWAY_IMAGE"
    - kubectl -n llm-gateway set image deployment/ui ui="$UI_IMAGE"
    - kubectl -n llm-gateway rollout status deployment/gateway --timeout=300s
    - kubectl -n llm-gateway rollout status deployment/ui --timeout=180s
  environment:
    name: k3s-production
    url: "http://$DEPLOY_HOST:30081"
  resource_group: k3s-production
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_REGISTRY'
      when: manual
