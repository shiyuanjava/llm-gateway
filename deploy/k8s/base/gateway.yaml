apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: llm-gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: management
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gateway-logs
  namespace: llm-gateway
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: llm-gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: wait-dependencies
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mysql 3306 && nc -z redis 6379 && nc -z nacos 8848; do echo waiting for dependencies; sleep 3; done"]
      containers:
        - name: gateway
          image: llm-gateway-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: llm-gateway-config
          env:
            # 应用密钥(JWT/管理员/供应商 Key)在 Nacos 的 llm-gateway.yaml,不走 Secret;
            # 这里只注入连基础设施要用的两个密码。网关连库读的是 MYSQL_PASSWORD,
            # 与 MySQL 容器共用 Secret 里的 MYSQL_ROOT_PASSWORD 这一个来源。
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llm-gateway-secrets
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: gateway-logs

