apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: llm-gateway
spec:
  selector:
    app: nacos
  ports:
    - name: client-http
      port: 8848
      targetPort: 8848
    - name: client-grpc
      port: 9848
      targetPort: 9848
    - name: console
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nacos
  namespace: llm-gateway
spec:
  serviceName: nacos
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v3.1.1
          env:
            - name: MODE
              value: standalone
            - name: NACOS_AUTH_ENABLED
              value: "false"
            - name: NACOS_AUTH_TOKEN
              value: SecretKey012345678901234567890123456789012345678901234567890123456789
            - name: NACOS_AUTH_IDENTITY_KEY
              value: nacos-local
            - name: NACOS_AUTH_IDENTITY_VALUE
              value: nacos-local
            - name: TZ
              value: Asia/Shanghai
          ports:
            - containerPort: 8848
            - containerPort: 9848
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /home/nacos/data
          readinessProbe:
            httpGet:
              path: /v3/console/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi

