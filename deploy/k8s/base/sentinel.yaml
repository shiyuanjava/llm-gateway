apiVersion: v1
kind: Service
metadata:
  name: sentinel-dashboard
  namespace: llm-gateway
spec:
  selector:
    app: sentinel-dashboard
  ports:
    - name: http
      port: 8858
      targetPort: 8858
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-dashboard
  namespace: llm-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-dashboard
  template:
    metadata:
      labels:
        app: sentinel-dashboard
    spec:
      containers:
        - name: sentinel-dashboard
          image: bladex/sentinel-dashboard:latest
          ports:
            - containerPort: 8858

