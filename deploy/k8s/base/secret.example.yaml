# 仅作字段说明,不在 kustomization 中应用。按部署文档用 kubectl 命令一次性创建。
# 只放基础设施密码:MySQL/Redis 容器启动就要用,网关也用它们连库连缓存。
# 应用密钥(GATEWAY_JWT_SECRET / ADMIN_* / 供应商 Key)不放 Secret:
# 统一在 Nacos 的 llm-gateway.yaml 配置(nacos-init 首启发布空模板,控制台填写)。
apiVersion: v1
kind: Secret
metadata:
  name: llm-gateway-secrets
  namespace: llm-gateway
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: replace-me
  REDIS_PASSWORD: replace-me
