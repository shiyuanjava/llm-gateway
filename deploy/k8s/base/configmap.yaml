apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-gateway-config
  namespace: llm-gateway
data:
  SPRING_PROFILES_ACTIVE: prod
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  MYSQL_DB: llm_gateway
  MYSQL_USER: root
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  GATEWAY_CACHE_STORE: redis
  NACOS_SERVER_ADDR: nacos:8848
  NACOS_DISCOVERY_ENABLED: "true"
  SENTINEL_DASHBOARD: sentinel-dashboard:8858
  GATEWAY_RATE_LIMIT_STORE: sentinel
  # 刻意不设 GATEWAY_ADMIN_ALLOWED_ORIGINS:空字符串环境变量会遮蔽 Nacos 配置;
  # 需要跨域白名单时在 Nacos 的 llm-gateway.yaml 里发布同名键
  JAVA_TOOL_OPTIONS: "-DJM.LOG.PATH=/app/logs/nacos -Dnacos.logging.default.config.enabled=false -Dcsp.sentinel.log.dir=/app/logs/sentinel"
  TZ: Asia/Shanghai

